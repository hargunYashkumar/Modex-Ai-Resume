version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: modex_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       modex_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout:  5s
      retries:  5

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: modex_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:              production
      PORT:                  5000
      DATABASE_URL:          postgresql://postgres:password@postgres:5432/modex_db
      JWT_SECRET:            ${JWT_SECRET}
      GOOGLE_CLIENT_ID:      ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET:  ${GOOGLE_CLIENT_SECRET}
      ANTHROPIC_API_KEY:     ${ANTHROPIC_API_KEY}
      FRONTEND_URL:          ${FRONTEND_URL:-http://localhost}
      EMAIL_PROVIDER:        ${EMAIL_PROVIDER:-log}
      EMAIL_FROM:            ${EMAIL_FROM:-noreply@modex.app}
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION:            ${AWS_REGION:-ap-south-1}
      AWS_S3_BUCKET:         ${AWS_S3_BUCKET:-}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    ports:
      - "5000:5000"
    healthcheck:
      test:     ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 30s
      timeout:  10s
      retries:  3

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL:          /api
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    container_name: modex_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  # pgAdmin - access at http://localhost:5050 (login: admin@admin.com / admin)
  # Start with: docker-compose --profile dev up
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: modex_pgadmin
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  uploads_data:
  logs_data:
  pgadmin_data:
