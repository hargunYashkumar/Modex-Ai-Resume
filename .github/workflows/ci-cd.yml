name: CI/CD — ResumeAI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests ─────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       resumeai_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install backend deps
        run: npm install
        working-directory: backend

      - name: Run migrations
        run: npm run db:migrate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/resumeai_test
          DB_USER:      postgres
          DB_PASSWORD:  password
          NODE_ENV:     test

      - name: Run tests
        run: npm test
        working-directory: backend
        env:
          DATABASE_URL:      postgresql://postgres:password@localhost:5432/resumeai_test
          DB_USER:           postgres
          DB_PASSWORD:       password
          JWT_SECRET:        test-secret-for-ci-only-not-used-in-prod
          NODE_ENV:          test
          # AI routes are mocked in tests — real key not needed
          ANTHROPIC_API_KEY: test-placeholder
          GOOGLE_CLIENT_ID:  test-placeholder
          FRONTEND_URL:      http://localhost:3000

  # ── Frontend build ────────────────────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install frontend deps
        run: npm install
        working-directory: frontend

      - name: Type-check (ESLint)
        run: npm run lint || true       # non-blocking for now
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL:          /api
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

