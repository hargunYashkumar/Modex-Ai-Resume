version: '3.9'
# docker-compose.dev.yml — Development override with hot reload
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  postgres:
    ports:
      - "5432:5432"   # expose DB to host so you can connect with TablePlus / pgAdmin

  backend:
    build:
      context: ./backend
      target: development       # uses dev stage if Dockerfile has multi-stage
    command: npx nodemon src/server.js
    volumes:
      - ./backend/src:/app/src              # mount source for hot reload
      - ./backend/migrations:/app/migrations
      - /app/node_modules                   # don't overwrite container's node_modules
    environment:
      NODE_ENV: development
    ports:
      - "5000:5000"
      - "9229:9229"             # Node inspector port for debugging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src             # mount source for Vite HMR
      - ./frontend/public:/app/public
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    command: npm run dev -- --host 0.0.0.0
